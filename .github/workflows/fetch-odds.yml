name: Fetch Odds & Scores

on:
  schedule:
    # Peak game hours (6PM-midnight EDT = 22:00-04:00 UTC): every 30 min
    # ~12 calls/day during peak for live odds updates
    - cron: '0,30 22-23 * * *'
    - cron: '0,30 0-3 * * *'
    # Early game hours (noon-6PM EDT = 16:00-21:00 UTC): hourly
    # ~6 calls/day for pregame odds
    - cron: '0 16-21 * * *'
    # Total: ~18 calls/day × 27 game days = ~486/month (under 500 free tier)
    # Dead hours (midnight-noon EDT = 04:00-16:00 UTC): OFF
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fetch odds and scores
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python fetch_odds.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cached_odds.json cached_espn.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update cached odds and scores [bot]"
            git push
          fi
