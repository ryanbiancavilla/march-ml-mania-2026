name: Fetch Odds & Scores

on:
  schedule:
    # Every 2 hours to stay under 500 credits/month (~360 requests)
    - cron: '0 */2 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - run: pip install requests

      - name: Fetch odds and scores
        env:
          ODDS_API_KEY: ${{ secrets.ODDS_API_KEY }}
        run: python fetch_odds.py

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add cached_odds.json cached_espn.json
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update cached odds and scores [bot]"
            git push
          fi
